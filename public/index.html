<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Camera Selection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }
    video {
      width: 300px;
      margin: 10px;
      border: 1px solid #ddd;
    }
    #local-video {
      border: 2px solid #4CAF50;
    }
    select {
      margin: 10px;
      padding: 5px;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Select Camera for Live Stream</h1>
  
  <!-- Dropdown to display available cameras -->
  <select id="camera-select"></select>
  
  <!-- Video Display -->
  <video id="local-video" autoplay muted playsinline></video>
  
  <button id="startButton">Start Video</button>

  <script>
    const cameraSelect = document.getElementById('camera-select');
    const localVideo = document.getElementById('local-video');
    let localStream;

    // Function to list all video input devices
    async function listCameras() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');

        // Populate the camera select dropdown
        cameraSelect.innerHTML = '';
        videoDevices.forEach((device, index) => {
          const option = document.createElement('option');
          option.value = device.deviceId;
          option.text = device.label || `Camera ${index + 1}`;
          cameraSelect.appendChild(option);
        });
      } catch (error) {
        console.error('Error accessing media devices:', error);
      }
    }

    // Function to start video from the selected camera
    async function startVideo() {
      try {
        const selectedDeviceId = cameraSelect.value;

        // Stop previous stream if it exists
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
        }

        // Start the stream with the selected device
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: selectedDeviceId } },
          audio: false
        });
        localVideo.srcObject = localStream;
      } catch (error) {
        console.error('Error starting video:', error);
      }
    }

    // Populate the camera list on page load
    window.onload = listCameras;

    // Start video when the button is clicked
    document.getElementById('startButton').onclick = startVideo;
  </script>

</body>
</html>
