<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Camera Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }
        video {
            width: 80%;
            height: auto;
            border: 2px solid green;
            margin-top: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        #videos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        #videos video {
            width: 45%;
            margin: 10px;
        }
    </style>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>

<h1>Mobile Camera Feed</h1>
<p>Stream your mobile camera and share it!</p>

<div id="videos">
    <video id="localVideo" autoplay muted></video>
</div>

<script>
    const localVideo = document.getElementById('localVideo');
    const videoContainer = document.getElementById('videos');

    const socket = io('https://evo-gqz9.onrender.com'); // Replace with your deployed server URL

    let localStream;
    const peerConnections = {}; // Store RTCPeerConnections by socket ID
    const iceServers = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' } // Google's public STUN server
        ]
    };

    // Start streaming the local camera
    async function startStream() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: false // Exclude audio
            });
            localVideo.srcObject = localStream;

            // Notify server that we have a stream ready
            socket.emit('ready-to-stream');
        } catch (error) {
            console.error('Error accessing media devices:', error);
        }
    }

    // Create a new peer connection for a specific socket ID
    function createPeerConnection(socketId) {
        const peerConnection = new RTCPeerConnection(iceServers);

        // Add local stream tracks to the peer connection
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        // Handle ICE candidates
        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                socket.emit('ice-candidate', { candidate: event.candidate, id: socketId });
            }
        };

        // Handle remote stream
        peerConnection.ontrack = event => {
            let remoteVideo = document.getElementById(socketId);
            if (!remoteVideo) {
                remoteVideo = document.createElement('video');
                remoteVideo.id = socketId;
                remoteVideo.autoplay = true;
                videoContainer.appendChild(remoteVideo);
            }
            remoteVideo.srcObject = event.streams[0];
        };

        peerConnections[socketId] = peerConnection;
    }

    // Create and send an offer to a specific socket ID
    async function createOffer(socketId) {
        const peerConnection = peerConnections[socketId];
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        socket.emit('offer', { sdp: offer.sdp, type: offer.type, id: socketId });
    }

    // Handle incoming offers
    socket.on('offer', async ({ sdp, type, id }) => {
        if (!peerConnections[id]) {
            createPeerConnection(id);
        }

        const remoteDesc = new RTCSessionDescription({ sdp, type });
        await peerConnections[id].setRemoteDescription(remoteDesc);

        const peerConnection = peerConnections[id];
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        socket.emit('answer', { sdp: answer.sdp, type: answer.type, id });
    });

    // Handle incoming answers
    socket.on('answer', async ({ sdp, type, id }) => {
        const remoteDesc = new RTCSessionDescription({ sdp, type });
        await peerConnections[id].setRemoteDescription(remoteDesc);
    });

    // Handle incoming ICE candidates
    socket.on('ice-candidate', async ({ candidate, id }) => {
        const peerConnection = peerConnections[id];
        if (candidate) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch (error) {
                console.error('Error adding received ICE candidate:', error);
            }
        }
    });

    // Handle new connections
    socket.on('new-user', id => {
        createPeerConnection(id);
        createOffer(id);
    });

    // Handle disconnections
    socket.on('user-disconnected', id => {
        const remoteVideo = document.getElementById(id);
        if (remoteVideo) {
            remoteVideo.remove();
        }
        if (peerConnections[id]) {
            peerConnections[id].close();
            delete peerConnections[id];
        }
    });

    // Start the stream on page load
    window.onload = startStream;
</script>

</body>
</html>
