<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Live Stream</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }
    video {
      width: 300px;
      margin: 10px;
      border: 1px solid #ddd;
    }
    #local-video {
      border: 2px solid #4CAF50;
    }
    #remote-video {
      border: 2px solid #ff6347;
    }
    #buttons {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>WebRTC Live Stream</h1>
  
  <!-- Local Video Display -->
  <video id="local-video" autoplay muted playsinline></video>

  <!-- Remote Video Display -->
  <video id="remote-video" autoplay playsinline></video>

  <div id="buttons">
    <!-- Action buttons -->
    <button id="startButton">Start Video</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Initialize socket connection
    const socket = io('https://evo-gqz9.onrender.com');  // Replace with your signaling server URL

    let localStream;
    let peerConnection;
    let remoteVideo = document.getElementById('remote-video');
    let localVideo = document.getElementById('local-video');

    const iceServers = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
      ]
    };

    // Initialize WebRTC components
    async function startVideo() {
      try {
        // Request access to user's webcam and microphone
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        localVideo.srcObject = localStream;

        // Initialize peer connection
        peerConnection = new RTCPeerConnection(iceServers);

        // Add local stream tracks to peer connection
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        // Listen for remote stream
        peerConnection.ontrack = function (event) {
          if (event.streams[0]) {
            remoteVideo.srcObject = event.streams[0];
          }
        };

        // Create offer and send to the server
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit('offer', { sdp: offer.sdp, type: offer.type });

      } catch (error) {
        console.error('Error starting video:', error);
      }
    }

    // Handle received offer
    socket.on('offer', async (data) => {
      console.log('Received offer:', data);

      if (!peerConnection) {
        await startVideo();
      }

      await peerConnection.setRemoteDescription(new RTCSessionDescription(data));

      // Create an answer and send it to the server
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      socket.emit('answer', { sdp: answer.sdp, type: answer.type });
    });

    // Handle received answer
    socket.on('answer', async (data) => {
      console.log('Received answer:', data);
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
    });

    // Handle ICE candidates
    socket.on('ice-candidate', (data) => {
      console.log('Received ICE candidate:', data);
      const candidate = new RTCIceCandidate({
        candidate: data.candidate,
        sdpMid: data.sdpMid,
        sdpMLineIndex: data.sdpMLineIndex
      });
      peerConnection.addIceCandidate(candidate);
    });

    // Send ICE candidates to the server
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        socket.emit('ice-candidate', {
          candidate: event.candidate.candidate,
          sdpMid: event.candidate.sdpMid,
          sdpMLineIndex: event.candidate.sdpMLineIndex
        });
      }
    };

    // Start video when the button is clicked
    document.getElementById('startButton').onclick = startVideo;
  </script>

</body>
</html>
